<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Offline · TrackMyGigs</title>
  <style>
    :root {
      --bg: #0D1117;
      --card: #161B22;
      --text: #E6EDF3;
      --text-2: #8B949E;
      --text-3: #6E7681;
      --border: #30363D;
      --accent: #F0A500;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      max-width: 360px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 24px;
      text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 12px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
    p { font-size: 14px; color: var(--text-2); line-height: 1.5; margin-bottom: 20px; }
    button {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }
    button:active { opacity: 0.85; }
    .hint { margin-top: 16px; font-size: 12px; color: var(--text-3); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#x1F4F6;</div>
    <h1>You&#x2019;re offline</h1>
    <p>TrackMyGigs needs a connection to load fresh data. Your cached gigs and invoices will be there when you reconnect.</p>
    <button onclick="location.reload()">Try again</button>
    <div class="hint">Check your signal and reload.</div>
  </div>
  <script>
    window.addEventListener('online', function () { location.reload(); });
  </script>
</body>
</html>
